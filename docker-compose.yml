services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: tax-billing-db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tax-billing-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tax-billing-backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./backend:/app
      - ./backups:/app/backups
    # Bound to 127.0.0.1 until auth lands (Milestone 3). See TASKS.md TASK-004.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tax-billing-network
    restart: unless-stopped

  # Flet Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tax-billing-frontend
    environment:
      API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - backend
    networks:
      - tax-billing-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  tax-billing-network:
    driver: bridge
