services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: tax-billing-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tax_billing
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tax-billing-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tax-billing-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/tax_billing
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./backend:/app
      - ./backups:/app/backups
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tax-billing-network
    restart: unless-stopped

  # Flet Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tax-billing-frontend
    environment:
      API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - tax-billing-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  tax-billing-network:
    driver: bridge
